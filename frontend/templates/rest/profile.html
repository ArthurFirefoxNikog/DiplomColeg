{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0"
    >
    <meta 
    name="author"
    content="Arthur Nikogosov"
    >
    <link 
    rel="shortcut icon"
    type="image/png"
    href="{% static 'pictures/favIcon/FavIcon_v1.png' %}"
    >
    <link 
    rel="stylesheet"
    href="{% static 'styles/general/reset.css' %}"
    >
    <link
    rel="stylesheet"
    href="{% static 'styles/general/backgr.css' %}"
    >
    <link
    rel="stylesheet"
    href="{% static 'styles/general/var-theme.css' %}"
    >
    <link
    rel="stylesheet"
    href="{% static 'styles/animation/animation-background-light-neon.css' %}"
    >
    <link
    rel="stylesheet"
    href="{% static 'styles/animation/animationө-appearances.css' %}"
    >
    <link
    rel="stylesheet"
    href="{% static 'styles/animation/animation-light-button-language-select.css' %}"
    >
    <link
    rel="stylesheet"
    href="{% static 'styles/animation/animation-light-button-language-select-lightTheme.css' %}"
    >
    <link
    rel="stylesheet"
    href="{% static 'styles/animation/animation-light-for-focus.css' %}"
    >
    <link
    rel="stylesheet"
    href="{% static 'styles/animation/animation-light-for-focus-lighgtTheme.css' %}"
    >
    <link
    rel="stylesheet"
    href="{% static 'styles/profile/profile.css' %}"
    >
    <link
    rel="stylesheet"
    href="{% static 'styles/profile/button-theme.css' %}"
    >
    <link
    rel="stylesheet"
    href="{% static 'styles/profile/buttons-language.css' %}"
    >
    <link
    rel="stylesheet"
    href="{% static 'styles/profile/button1-main.css' %}"
    >
    <base target="_self">
    <title>SaveMe!</title>
</head>
<body>
    <div class="profile">
        <div>
            <div class="text-pole">
                <p data-i18n="res.profile.text.email"></p>
                <p name="email_visible">{{ user.email|default:"..." }}</p>
            </div>
            <div class="text-pole">
                <p data-i18n="res.profile.text.login"></p>
                <p name="login_visible">{{ user.username|default:"..." }}</p>
            </div>
            <div class="text-pole">
                <p data-i18n="res.profile.text.date"></p>
                <p name="date-register">{{ user.date_joined|date:"d.m.Y H:i" }}</p>
            </div>
        </div>
        <div class="buttons-language">
                <ol>
                    <li><button value="ru" data-i18n="buttons-lang.0"></button></li>
                    <li><button value="en" data-i18n="buttons-lang.1"></button></li>
                    <li><button value="kk" data-i18n="buttons-lang.2"></button></li>
                </ol>
        </div>
        <button class="button-theme form-login-button-theme-position" id="theme-toggle"></button>
        <a id="link-for-index" href="{% url 'index' %}" style="display:none;"></a>
        <button class="button1" id="button-link-for-index" data-i18n="res.profile.button-link-for-index"></button>
    </div>
    <script src="{% static 'script/general/themeLight.js' %}"></script>
    <script src="{% static 'script/general/translation.js' %}"></script>
    <script src="{% static 'script/profile/movement.js' %}"></script>
</body>
</html>
